<html>
    <head>
        <title>elementSectors</title>
    </head>
    <body>
        <h1 id="my-heading"> Food for Us</h1> <br>
        <div class="fruits">Apple</div>
        <div class="fruits">Orange</div>
        <div class="fruits">Banana</div>
        <h4>Root Vegetables</h4>
        <ul>
            <li>Carrot</li>
            <li>Beetroot</li>
            <li>Sweet potato</li>
        </ul>
        <h4>Non-Root Vegetables</h4>
        <ul>
            <li>Brinjal</li>
            <li>Tomoto</li>
            <li>Cucumber</li>
        </ul>
        <script>
            //------------------1. document.getElementById()-------------- 

            const myHeading = document.getElementById("my-heading");
            myHeading.style.backgroundColor = "yellow";
            myHeading.style.textAlign = "center";

            // --------------2. document.getElementsByClassName()----------

            const fruits = document.getElementsByClassName("fruits");
            //fruits[1].style.backgroundColor = "yellow";
            // for(let fruit of fruits){
            //     fruit.style.backgroundColor = "yellow";
            // }
            // Array.from(fruits).forEach(fruit => {
            //     fruit.style.backgroundColor = "yellow";
            // });

            //----------------3. document.getElementsByTagName()---------- 
            const h4Elements = document.getElementsByTagName("h4");
            const liElements = document.getElementsByTagName("li");
            // for(let h4Element of h4Elements){
            //     h4Element.style.backgroundColor = "red";
            // }
            // for(let liElement of liElements){
            //     liElement.style.backgroundColor = "skyblue";
            // }
            // Array.from(h4Elements).forEach(h4Element => {
            //     h4Element.style.backgroundColor = "red";
            // })
            //  Array.from(liElements).forEach(liElement => {
            //     liElement.style.backgroundColor = "green";
            // })

            //-------------4. document.querySelector()------------------
            const element = document.querySelector("li");
            element.style.backgroundColor = "yellow";

            //--------------5. document.querySelectorAll()-----------------
            const foods = document.querySelectorAll("li");
            foods.forEach(food => {
                food.style.backgroundColor = "lightgreen";
            })

        </script>
    </body>
</html>
