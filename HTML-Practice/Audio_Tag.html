<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To insert Audio</title>
</head>
<body>
    <h1>Audio Tag</h1><br><br><hr>
    <h3>My Fav BGM List</h3> <br>
    <audio controls autoplay muted loop src="Audios/bgm2.mp3" title="This is Song1"></audio><br>
    <audio controls autoplay muted loop src="Audios/bgm1.mp3" title="This is Song2"></audio><br>
    <audio controls autoplay muted loop src="Audios/bgm3.mp3" title="This is Song3"></audio><br>
    <audio controls autoplay muted loop src="Audios/bgm4.mp3" title="This is Song4"></audio><br><br><hr>

    <audio controls autoplay muted loop>
        <source src="Audios/bgm2.mp3">
        <source src="Audios/bgm2.wav">
        Your browser does not support the audio element.
    </audio><br>
    
   
</body>
</html>
