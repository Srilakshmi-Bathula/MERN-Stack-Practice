<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Create Forms</title>
</head>
<body>
    <h3>Form Tag</h3> <br><br><hr>

    <form action="action.php">

        <div>
        <label for="first">
           First Name: <input type="text" id="first" name="first" placeholder="Enter your first name">
        </label>
        </div>

        <br>

        <div>
        <label for="last">
           Last Name: <input type="text" id="last" name="last" placeholder="Enter your last name">
        </label>
        </div>

        <br>

         <div>
        <label for="ema">
           Email: <input type="email" id="ema" name="ema">
        </label>
        </div>

        <br>

        <div>
        <label for="pass">
           Password: <input type="password" id="pass" name="pass" maxlength="6" required>
        </label>
        </div>

        <br>

         <div>
        <label for="pass">
          Telephone: <input type="tel" id="pass" name="pass" placeholder="+91 " required>
        </label>
        </div>

        <br>

         <div>
        <label for="pass">
           Date of Birth: <input type="date" id="pass" name="pass" required>
        </label>
        </div>

        <br>

         <div>
        <label for="pass">
           Age: <input type="number" id="pass" name="pass" min="0" max="99" required>
        </label>
        </div>

        <br>

         <div>
        <label for="pass">
            Mr:<input type="radio" id="pass" name="pass">
        </label>
        <label for="pass">
            Ms:<input type="radio" id="pass" name="pass">
        </label>
        <label for="pass">
            Phd:<input type="radio" id="pass" name="pass">
        </label>
        </div>

        <br>
        <div>
        <label for="pass">
            Choose: <select type="password" id="pass" name="pass">
                <option>US</option>
                <option>UK</option>
                <option>Africa</option>
            </select>
        </label>
        </div>
        <br>

        <div>
        <label for="pass">
           Subscribe: <input type="checkbox" id="pass" name="pass" min="0" max="99" required>
        </label>
        </div>

        <br>


        <button type="reset">Reset</button><br><br>
        <button type="submit">submit</button>


    </form>
</body>
</html>
