<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For List Of Items</title>
</head>
<body>
    <h1>List Tags</h1> <br><br><hr>
    
    <h3>Unordered List</h3>
    <ul>
        <li>Fruits</li>
        <li>Flowers</li>
        <li>Animals
            <ul>
                <li>Dog</li>
                <li>Cat</li>
                <li>Rat</li>
            </ul>
        </li>
    </ul>
    <br><hr>

    <h3>Ordered List</h3>
    <ol>
        <li>Java</li>
        <li>Python</li>
        <li>C++</li>
    </ol>
    <br><hr>

    <h3>Description List</h3>
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JS</dt>
        <dd>Java Script</dd>
    </dl> 
    <br><hr>
    <br><br><hr>
    
</body>
</html>
