<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Sign-Up Page</title>
    </head>

    <body>
        <form>
            <h1>Sign Up</h1>
            <p>Create an Account</p><br><br>
            <label for="fname">Full Name:</label><br>
               <input type="text" placeholder="Your name" required minlength="3" maxlength="40" autofocus>
            <br><br>

            <label for="email"> Email:</label><br>
                <input type="email" placeholder="you@example.com" required>
            <br><br>

            <label for="pass"> Password:</label><br>
               <input type="password" placeholder="Atleast 6 characters" required minlength="6" maxlength="20">
            <br><br>

            <label for="dob">Date of Birth:</label><br>
                <input type="date" required>
            <br><br>

            <label for="num">Phone Number:</label><br>
                <input type="tel" placeholder="10 - didgit number" pattern="[0-9][10]" required minlength="10" maxlength="10">
            <br><br>

            <button type="button">Sign Up</button>
        </form>
        
        <br>
        <a href="Login_Page.html">Already have an Account? Login</a> |
        <a href="Login_Form.html">Home</a>
    </body>
</html>
